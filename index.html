<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>A Special Surprise ❤️</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="background"></div>
<div id="hearts"></div>

<div class="container">

    <!-- Welcome Screen -->
    <section id="welcome" class="screen active">

        <h1>❤️</h1>

        <h2>Hey Shota...</h2>

        <p>
            I made something just for you.<br>
            Please answer a few questions 😊
        </p>

        <button id="startBtn">
            Start ❤️
        </button>

    </section>


    <!-- Progress -->
    <div id="progress">

        <div id="progressBar"></div>

    </div>


    <!-- Question Screen -->
    <section id="questionScreen" class="screen">

        <h2 id="question"></h2>

        <div id="answers">

        </div>

    </section>


    <!-- Video Screen -->
    <section id="videoScreen" class="screen">

        <h2>Your Surprise ❤️</h2>

        <video id="loveVideo" controls>

            <source src="assets/video.mp4" type="video/mp4">

        </video>

    </section>


    <!-- Final Screen -->
<section id="finalScreen" class="screen">

    <div class="final-heart">❤️</div>

    <h2 class="final-title">
        I Love You
    </h2>

    <button id="restartBtn">
        ❤️ Watch Again
    </button>

</section>

</div>

<script src="script.js"></script>

</body>
</html>
